<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Ecodesbroce – Calculadora</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00bb66">

  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    body { margin: 0; background:#f6f7f8; }
    header { padding: 14px 16px; background:#00bb66; color:#fff; font-weight:700; }
    main { padding: 14px 16px; max-width: 760px; margin: 0 auto; }
    .card { background:#fff; border-radius:14px; padding: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.06); margin-bottom: 12px; }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    label { display:block; font-size: 12px; color:#333; margin-bottom: 6px; }
    select, input { width:100%; padding: 10px 12px; border:1px solid #ddd; border-radius: 12px; font-size: 16px; background:#fff; }
    .btnrow { display:flex; gap:10px; flex-wrap:wrap; }
    button { border:0; border-radius: 12px; padding: 10px 12px; font-size: 16px; font-weight:600; cursor:pointer; }
    .primary { background:#00bb66; color:#fff; }
    .ghost { background:#eef1f2; color:#111; }
    .mono { font-variant-numeric: tabular-nums; }
    .big { font-size: 22px; font-weight: 800; }
    .muted { color:#555; font-size: 13px; }
    .full { grid-column: 1 / -1; }
    @media (max-width: 560px){ .row{ grid-template-columns: 1fr; } }
  </style>
</head>

<body>

<header>Ecodesbroce – Calculadora de presupuesto</header>

<main>

  <div class="card">
    <div class="row">
      <div>
        <label>Superficie (m²)</label>
        <input id="m2" type="number" min="0" step="1" value="1000" />
      </div>

      <div>
        <label>IVA (%)</label>
        <input id="iva" type="number" min="0" step="1" value="21" />
      </div>

      <div>
        <label>Tipo de parcela</label>
        <select id="parcela">
          <option>Rústica</option>
          <option>Industrial</option>
          <option>Urbana</option>
        </select>
      </div>

      <div>
        <label>Estado de vegetación</label>
        <select id="veg">
          <option>Hierba baja</option>
          <option>Hierba media</option>
          <option>Hierba alta</option>
          <option>Maleza densa</option>
        </select>
      </div>

      <div>
        <label>Accesibilidad</label>
        <select id="acc">
          <option>Buena</option>
          <option>Regular</option>
          <option>Difícil</option>
        </select>
      </div>

      <div>
        <label>Retirada de restos</label>
        <select id="restos">
          <option>No</option>
          <option>Sí</option>
        </select>
      </div>

      <div class="full">
        <label>Mínimo (€)</label>
        <input id="minimo" type="number" value="150" />
      </div>
    </div>

    <div style="height:10px"></div>
    <div class="btnrow">
      <button class="primary" onclick="calcular()">Calcular</button>
      <button class="ghost" onclick="guardar()">Guardar precios</button>
      <button class="ghost" onclick="resetear()">Reset precios</button>
    </div>
  </div>

  <div class="card">
    <div class="muted">Total sin IVA</div>
    <div class="big mono" id="neto">—</div>

    <div class="muted">IVA</div>
    <div class="mono" id="ivaOut">—</div>

    <div class="muted">Total con IVA</div>
    <div class="mono" id="total">—</div>

    <div class="muted">Detalle</div>
    <div class="mono" id="detalle">—</div>
  </div>

</main>

<script>
const DEF = { base:0.15, ind:0.045, urb:0.075, hm:0.03, ha:0.075, md:0.15, ar:0.03, ad:0.075, rr:0.05 };
const $ = id => document.getElementById(id);

function precios(){ return JSON.parse(localStorage.getItem("eco_prices") || JSON.stringify(DEF)); }
function guardar(){ localStorage.setItem("eco_prices", JSON.stringify(DEF)); alert("Precios guardados"); }
function resetear(){ localStorage.removeItem("eco_prices"); alert("Precios restaurados"); }

function eur(v){ return new Intl.NumberFormat("es-ES",{style:"currency",currency:"EUR"}).format(v); }

function calcular(){
  const m2 = +$("m2").value || 0;
  const iva = +$("iva").value || 0;
  const min = +$("minimo").value || 150;
  const p = precios();

  // Precio por m² (modelo Easy Firma: base + suplementos)
  let pm2 = p.base;
  const det = [];
  det.push(`m²: ${m2}`);
  det.push(`Base: ${(p.base).toFixed(3)} €/m²`);

  if($("parcela").value==="Industrial"){ pm2 += p.ind; det.push(`Parcela industrial: +${p.ind.toFixed(3)} €/m²`); }
  if($("parcela").value==="Urbana"){     pm2 += p.urb; det.push(`Parcela urbana: +${p.urb.toFixed(3)} €/m²`); }

  if($("veg").value==="Hierba media"){   pm2 += p.hm;  det.push(`Hierba media: +${p.hm.toFixed(3)} €/m²`); }
  if($("veg").value==="Hierba alta"){    pm2 += p.ha;  det.push(`Hierba alta: +${p.ha.toFixed(3)} €/m²`); }
  if($("veg").value==="Maleza densa"){   pm2 += p.md;  det.push(`Maleza densa: +${p.md.toFixed(3)} €/m²`); }

  if($("acc").value==="Regular"){        pm2 += p.ar;  det.push(`Accesibilidad regular: +${p.ar.toFixed(3)} €/m²`); }
  if($("acc").value==="Difícil"){        pm2 += p.ad;  det.push(`Accesibilidad difícil: +${p.ad.toFixed(3)} €/m²`); }

  if($("restos").value==="Sí"){          pm2 += p.rr;  det.push(`Retirada restos: +${p.rr.toFixed(3)} €/m²`); }

  const calculado = m2 * pm2;
  const neto = Math.max(min, calculado);

  det.push(`€/m² total: ${pm2.toFixed(3)} €/m²`);
  det.push(`Calculado: ${eur(calculado)} (sin IVA)`);
  if (neto === min && calculado < min) det.push(`Mínimo aplicado: ${eur(min)} (sin IVA)`);

  $("neto").textContent = eur(neto);
  $("ivaOut").textContent = eur(neto * iva/100);
  $("total").textContent = eur(neto * (1 + iva/100));
  $("detalle").innerHTML = det.join("<br>");
}

calcular();
</script>

<!-- Service Worker -->
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js");
  });
}
</script>

</body>
</html>
